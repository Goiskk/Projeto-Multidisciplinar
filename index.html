<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Biblioteca</h1>

    <p>Sistema de gerenciamento de biblioteca.</p>

    <!-- Formulário -->

    <input id="titulo" placeholder="Título do livro">
    <input id="autor" placeholder="Autor">
    <input id="categoria" placeholder="Categoria">
    <input id="usuario" placeholder="Usuário">

    <!-- Botões -->

    <button onclick="cadastrarLivro()">
        Cadastrar Livro
    </button>

    <button onclick="listarLivros()">
        Listar Livros
    </button>

    <button onclick="listarDisponiveis()">
        Livros Disponíveis
    </button>

    <!-- Resultado -->

    <div id="resultado"></div>

    <script src="script.js"></script>

</body>
</html>
